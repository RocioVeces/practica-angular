<div class="row">
  <div class="col-md-12">
    <h2 class="mb-4">&#9654; Gestión de Películas</h2>
  </div>

  <!-- Formulario -->
  <div class="col-md-4">
    <div class="card shadow p-3 mb-4">
      <h5>{{ modoEdicion ? 'Editar Película' : 'Nueva Película' }}</h5>
      <div class="mb-2">
        <label>Título</label>
        <input type="text" class="form-control" [(ngModel)]="pelicula.titulo" />
      </div>
      <div class="mb-2">
        <label>Director</label>
        <input type="text" class="form-control" [(ngModel)]="pelicula.director" />
      </div>
      <div class="mb-2">
        <label>Año</label>
        <input type="number" class="form-control" [(ngModel)]="pelicula.anio" />
      </div>
      <div class="mb-2">
        <label>Género</label>
        <input type="text" class="form-control" [(ngModel)]="pelicula.genero" />
      </div>
      <div class="d-flex gap-2 mt-2">
        <button class="btn btn-primary w-100" (click)="guardar()">
          {{ modoEdicion ? 'Actualizar' : 'Añadir' }}
        </button>
        <button *ngIf="modoEdicion" class="btn btn-secondary w-100" (click)="limpiar()">
          Cancelar
        </button>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-body">
        <table class="table table-striped table-hover">
          <thead class="table-primary">
            <tr>
              <th>ID</th>
              <th>Título</th>
              <th>Director</th>
              <th>Año</th>
              <th>Género</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of peliculas">
              <td>{{ p.id }}</td>
              <td>{{ p.titulo }}</td>
              <td>{{ p.director }}</td>
              <td>{{ p.anio }}</td>
              <td>{{ p.genero }}</td>
              <td>
                <button class="btn btn-warning btn-sm me-1" (click)="editar(p)">&#9998;</button>
                <button class="btn btn-danger btn-sm" (click)="eliminar(p.id)">&#10006;</button>
              </td>
            </tr>
            <tr *ngIf="peliculas.length === 0">
              <td colspan="6" class="text-center text-muted">No hay películas todavía</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
